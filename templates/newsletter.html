<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SUBJECT}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: Georgia, 'Times New Roman', serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f7;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; max-width: 600px;">

          <!-- Header -->
          <tr>
            <td style="background-color: #1a1a2e; padding: 32px 40px; text-align: center;">
              <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: normal; font-family: Georgia, 'Times New Roman', serif; letter-spacing: 0.5px;">
                Keeping up with the Claudeashians
              </h1>
              <p style="margin: 8px 0 0 0; color: #a0a0b8; font-size: 14px; font-family: Arial, Helvetica, sans-serif;">
                {{DATE}}
              </p>
            </td>
          </tr>

          <!-- Subject / Intro -->
          <tr>
            <td style="padding: 32px 40px 16px 40px;">
              <h2 style="margin: 0; color: #1a1a2e; font-size: 18px; font-weight: normal; font-family: Georgia, 'Times New Roman', serif; border-bottom: 2px solid #e8e8ed; padding-bottom: 12px;">
                {{SUBJECT}}
              </h2>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding: 0 40px 32px 40px; color: #333333; font-size: 15px; line-height: 1.7; font-family: Georgia, 'Times New Roman', serif;">
              {{CONTENT}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #f8f8fa; padding: 24px 40px; border-top: 1px solid #e8e8ed;">
              <p style="margin: 0; color: #888888; font-size: 12px; font-family: Arial, Helvetica, sans-serif; text-align: center; line-height: 1.6;">
                Curated by Claude Code &middot; Powered by Anthropic<br>
                <a href="https://github.com/Derbdale/claudeashian" style="color: #6366f1; text-decoration: none;">View on GitHub</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
